<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>实习翻译机 · 图文笔记九宫格</title>
<style>
:root{--koi:#E0694A;--koi-deep:#C24E32;--koi-line:#EAD2C5;--koi-bg:#FBEDE4;--gold:#C0922F;
 --ink:#2B2722;--ink-2:#4A463F;--muted:#B3A793;--dim:#9A8F7E;--border:#E8DECB;--surface-2:#FBF6EE;
 --sage:#5E7A63;--sage-bg:#EDF2EC;--sage-line:#CFE0CF;--serif:"Noto Serif SC",ui-serif,Georgia,serif;}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
body{background:#EFE6D4;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);padding:18px 0 50px;}
.tip{text-align:center;color:#8C8473;font-size:13px;margin:6px 16px 18px;line-height:1.6;}
.deck{display:flex;flex-direction:column;align-items:center;gap:22px;}
.slide{position:relative;width:min(92vw,430px);aspect-ratio:3/4;border-radius:22px;overflow:hidden;box-shadow:0 16px 40px -20px rgba(150,110,60,.5);}
.no{position:absolute;top:12px;right:14px;font-size:11px;color:#C3B79F;font-weight:700;z-index:5;}
/* 海报卡(封面/痛点/CTA) */
.poster{background:linear-gradient(168deg,#FFFBF2,#FBEEDB);padding:34px 30px;display:flex;flex-direction:column;}
.poster.cover{background:linear-gradient(165deg,#FFE9CC,#FBD9B6);justify-content:center;text-align:center;}
.eyebrow{font-size:14px;font-weight:700;color:var(--koi-deep);letter-spacing:.04em;margin-bottom:14px;}
.big{font-family:var(--serif);font-weight:900;font-size:33px;line-height:1.3;}
.big.sm{font-size:28px;}
.big em{font-style:normal;color:var(--koi);}
.sub{font-size:16px;line-height:1.7;color:#5C5345;margin-top:16px;}
.lst{margin-top:16px;font-size:17px;line-height:2;color:#3F3A32;}
.spacer{flex:1;}
.foot{font-size:13.5px;color:#9A8F7E;}
.tag{display:inline-block;background:var(--koi);color:#fff;font-weight:700;font-size:12.5px;border-radius:20px;padding:4px 13px;letter-spacing:.06em;}
.koiwrap{display:flex;justify-content:center;margin-top:8px;}
/* 产品内页截图卡 */
.shot{background:#FAF5EC;display:flex;flex-direction:column;}
.appbar{height:32px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12.5px;font-weight:700;}
.appbar .rt{display:flex;gap:5px;align-items:center;font-size:11px;}
.cap{flex:none;margin:4px 12px 8px;background:var(--koi);color:#fff;font-weight:700;font-size:13.5px;border-radius:12px;padding:8px 12px;text-align:center;box-shadow:0 6px 14px -8px rgba(224,105,74,.7);}
.appbody{flex:1;overflow:hidden;padding:0 13px 13px;}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:0 8px 20px -16px rgba(150,110,60,.5);}
.datestrip{font-size:12px;color:var(--dim);font-weight:600;margin:2px 0 9px;}
.q{margin-bottom:9px;}
.qlabel{font-size:12.5px;font-weight:700;display:flex;gap:7px;line-height:1.4;}
.qnum{font-family:var(--serif);color:var(--koi);font-weight:700;flex:none;}
.qa{margin-top:5px;background:var(--surface-2);border:1px solid #ECE0CC;border-radius:9px;padding:7px 9px;font-size:11.5px;color:var(--ink-2);line-height:1.45;}
.qbtn{margin-top:10px;background:var(--koi);color:#fff;font-weight:700;border-radius:11px;padding:11px;text-align:center;font-size:13.5px;box-shadow:0 8px 16px -9px rgba(224,105,74,.65);}
/* 结果卡 luck */
.luck{border-radius:16px;padding:16px;background:linear-gradient(170deg,#FCF1EA,#FBF6EE);border:1px solid var(--koi-line);}
.luck.gold{background:linear-gradient(160deg,#FFF7DC,#FBE8B8);border-color:#E9C766;}
.lucktop{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.luckstamp{font-family:var(--serif);font-size:12px;font-weight:700;color:#fff;background:var(--koi);border-radius:8px;padding:3px 9px;}
.luck.gold .luckstamp{background:linear-gradient(135deg,#E0A92E,#C9881E);}
.luckname{font-family:var(--serif);font-size:13px;color:var(--koi-deep);font-weight:600;}
.luckmsg{font-family:var(--serif);font-size:15.5px;line-height:1.7;color:var(--ink);font-weight:500;}
.luckbullet{margin-top:12px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 13px;}
.bltag{font-size:10.5px;font-weight:700;color:var(--sage);letter-spacing:.06em;margin-bottom:7px;}
.blbody{font-size:13.5px;line-height:1.65;color:var(--ink);font-weight:500;}
.lucktip{margin-top:10px;font-size:11.5px;color:var(--muted);}
/* 养成进度 */
.klvtop{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.klvbadge{font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;background:linear-gradient(135deg,var(--koi),var(--koi-deep));padding:3px 11px;border-radius:20px;}
.klvnext{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600;}
.klvtrack{height:8px;background:var(--koi-bg);border:1px solid var(--koi-line);border-radius:6px;overflow:hidden;}
.klvfill{height:100%;background:linear-gradient(90deg,var(--koi),var(--gold));border-radius:6px;}
/* 简历成品 paper */
.paper{background:linear-gradient(180deg,#FFFFFF,#FCFAF6);border:1px solid var(--border);border-radius:16px;padding:16px;}
.ptitle{font-size:19px;font-weight:900;margin:6px 0 4px;}
.psub{font-size:11.5px;color:var(--dim);line-height:1.5;margin-bottom:12px;}
.rfgroup{margin-bottom:12px;}
.rfhead{font-family:var(--serif);font-weight:700;font-size:13px;color:var(--ink);padding-bottom:5px;margin-bottom:7px;border-bottom:1.5px solid var(--koi-line);}
.rfbul{font-size:12.5px;line-height:1.65;color:var(--ink-2);display:flex;gap:6px;margin-bottom:6px;}
.rfdash{color:var(--koi);font-weight:700;flex:none;}
/* 收集册 */
.sgcoll{background:#fff;border:1px solid var(--border);border-radius:16px;padding:13px;}
.sgh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.sgt{font-family:var(--serif);font-weight:700;font-size:14px;}
.sgp{font-size:11px;font-weight:700;color:var(--koi-deep);}
.sggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sgcell{border-radius:9px;border:1px solid var(--border);min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.sgcell .ic{font-size:14px;}
.sgcell .sn{font-family:var(--serif);font-size:10px;font-weight:600;}
.sgcell.lit{color:var(--koi-deep);background:linear-gradient(160deg,#FFF3EC,#FBE3D6);border-color:var(--koi-line);}
.sgcell.dark{color:#C7BBA8;background:var(--surface-2);}
.gp{position:absolute;top:-10px;width:7px;height:7px;border-radius:60% 0 60% 0;opacity:0;animation:gf linear infinite;z-index:1;}
@keyframes gf{0%{transform:translateY(-10px);opacity:0}12%{opacity:1}100%{transform:translateY(440px) translateX(var(--dx)) rotate(320deg);opacity:0}}
.desc{width:min(92vw,430px);margin:10px auto 0;background:#fff;border:1px solid var(--koi-line);border-radius:16px;padding:16px;font-size:13.5px;line-height:1.8;color:#4A463F;white-space:pre-wrap;}
</style>
</head>
