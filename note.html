<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>实习翻译机 · 图文笔记九宫格</title>
<style>
:root{--koi:#E0694A;--koi-deep:#C24E32;--ink:#2B2722;--cream:#FBF3E4;--line:#EAD6BE;}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
body{background:#EFE6D4;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);padding:18px 0 50px;}
.tip{text-align:center;color:#8C8473;font-size:13px;margin:6px 16px 18px;line-height:1.6;}
.deck{display:flex;flex-direction:column;align-items:center;gap:22px;}
.slide{position:relative;width:min(92vw,430px);aspect-ratio:3/4;border-radius:22px;overflow:hidden;
 background:linear-gradient(168deg,#FFFBF2,#FBEEDB);box-shadow:0 16px 40px -20px rgba(150,110,60,.5);
 padding:34px 30px;display:flex;flex-direction:column;}
.slide .no{position:absolute;top:16px;right:18px;font-size:12px;color:#C3B79F;font-weight:700;}
.eyebrow{font-size:14px;font-weight:700;color:var(--koi-deep);letter-spacing:.04em;margin-bottom:14px;}
.big{font-family:"Noto Serif SC",serif;font-weight:900;font-size:34px;line-height:1.28;letter-spacing:.01em;}
.big.sm{font-size:29px;}
.big em{font-style:normal;color:var(--koi);}
.sub{font-size:16px;line-height:1.7;color:#5C5345;margin-top:16px;}
.lst{margin-top:18px;font-size:17px;line-height:2;color:#3F3a32;}
.lst.s{font-size:15.5px;line-height:1.95;}
.spacer{flex:1;}
.foot{font-size:13.5px;color:#9A8F7E;}
.koiwrap{display:flex;justify-content:center;align-items:center;margin-top:8px;}
.cmp{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
.cbox{border-radius:14px;padding:13px 15px;font-size:15px;line-height:1.55;}
.cbox.bad{background:#F3ECE0;color:#8C8473;border:1px solid #E7DDCB;}
.cbox.good{background:linear-gradient(160deg,#FFF1E8,#FBE2D2);color:var(--ink);border:1px solid var(--line);}
.cbox .t{font-size:11.5px;font-weight:700;letter-spacing:.05em;margin-bottom:5px;}
.cbox.bad .t{color:#B3A793;}.cbox.good .t{color:var(--koi-deep);}
.parade{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:14px;}
.pcell{width:30%;text-align:center;}
.pcell svg{display:block;margin:0 auto;}
.pcell b{font-size:10px;color:#9A8F7E;font-family:"Noto Serif SC",serif;}
.gold{position:relative;border-radius:16px;overflow:hidden;height:120px;margin-top:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FFF7DC,#FBE6B6);}
.gp{position:absolute;top:-10px;width:8px;height:8px;border-radius:60% 0 60% 0;opacity:0;animation:gf linear infinite;}
@keyframes gf{0%{transform:translateY(-10px);opacity:0}12%{opacity:1}100%{transform:translateY(130px) translateX(var(--dx)) rotate(320deg);opacity:0}}
.cover{justify-content:center;text-align:center;background:linear-gradient(165deg,#FFE9CC,#FBD9B6);}
.cover .big{font-size:38px;}
.tag{display:inline-block;background:var(--koi);color:#fff;font-weight:700;font-size:12.5px;border-radius:20px;padding:4px 13px;letter-spacing:.06em;}
.desc{width:min(92vw,430px);margin:10px auto 0;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;font-size:13.5px;line-height:1.8;color:#4A463F;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="tip">📸 逐张截图发小红书 · 每张已是 3:4 · 第 9 张下面附正文文案</div>
